name: Build and Push Nextcloud Image

on:
  push:
    branches: [main]
  schedule:
    # Rebuild weekly to pick up base image security updates
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alexandercleasby/nextcloud-ffmpeg

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "30"
            variant: apache
            tags: |
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:30
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:30-apache
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:latest
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:apache
          - version: "30"
            variant: fpm
            tags: |
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:30-fpm
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:fpm
          - version: "29"
            variant: apache
            tags: |
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:29
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:29-apache
          - version: "29"
            variant: fpm
            tags: |
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:29-fpm
          - version: "28"
            variant: apache
            tags: |
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:28
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:28-apache
          - version: "28"
            variant: fpm
            tags: |
              ghcr.io/alexandercleasby/nextcloud-ffmpeg:28-fpm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ matrix.tags }}
          build-args: BASE_TAG=${{ matrix.version }}-${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.version }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.version }}-${{ matrix.variant }}
